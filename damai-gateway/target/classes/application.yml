server:
  port: 9000

spring:
  application:
    name: damai-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: program-service
              uri: lb://damai-program
              predicates:
                - Path=/api/program/**

            - id: order-service
              uri: lb://damai-order
              predicates:
                - Path=/api/order/**

            - id: user-service
              uri: lb://damai-user
              predicates:
                - Path=/api/user/**

  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

jwt:
  secret: damai-ticket-secret-key-2026-must-be-at-least-32-bytes
