server:
  port: 9000

spring:
  application:
    name: damai-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      server:
        webflux:
          routes:
            - id: program-service
              uri: lb://damai-program
              predicates:
                - Path=/api/program/**

            - id: order-service
              uri: lb://damai-order
              predicates:
                - Path=/api/order/**

            - id: user-service
              uri: lb://damai-user
              predicates:
                - Path=/api/user/**

  data:
    redis:
      host: localhost
      port: 6379
