server:
  port: 8083

spring:
  application:
    name: damai-user
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/damai_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    druid:
      max-active: 30
      min-idle: 5
      initial-size: 5
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: damai-ticket-secret-key-2026-must-be-at-least-32-bytes
  expiration-ms: 86400000
